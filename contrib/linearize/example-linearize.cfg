# dpowcoind RPC settings (linearize-hashes)
rpcuser=someuser
rpcpassword=somepassword
#datadir=~/.dpowcoin
host=127.0.0.1

#mainnet default
port=42002

#testnet default
#port=18332

#regtest default
#port=18443

#signet default
#port=38332

# bootstrap.dat hashlist settings (linearize-hashes)
max_height=313000

# bootstrap.dat input/output settings (linearize-data)

# mainnet
netmagic=f29f4afb
genesis=d86f8a0582e779830f182befeaaabc8c73a159b6b06530910758daf17ce31e36
input=/home/example/.dpowcoin/blocks

# testnet
#netmagic=3cda0be8
#genesis=50b91b8074496181a7245d505f1e416a419b6ec9730c34dab78b3f8a277f66a9
#input=/home/example/.dpowcoin/testnet3/blocks

# regtest
#netmagic=afc00c2e
#genesis=3d96e9f00b7c9a8f9104393435b5f3fd597b5cdd95ae67d9251cfc622a575a22
#input=/home/example/.dpowcoin/regtest/blocks

# signet
#netmagic=ea64ee7f
#genesis=8006ef13ffa802f6f71f4891f9245a391088802711e643929f882de6ff042ddd
#input=/home/example/.dpowcoin/signet/blocks

# "output" option causes blockchain files to be written to the given location,
# with "output_file" ignored. If not used, "output_file" is used instead.
# output=/home/example/blockchain_directory
output_file=/home/example/Downloads/bootstrap.dat
hashlist=hashlist.txt

# Maximum size in bytes of out-of-order blocks cache in memory
out_of_order_cache_sz = 100000000

# Do we want the reverse the hash bytes coming from getblockhash?
rev_hash_bytes = False

# On a new month, do we want to set the access and modify times of the new
# blockchain file?
file_timestamp = 0
# Do we want to split the blockchain files given a new month or specific height?
split_timestamp = 0

# Do we want debug printouts?
debug_output = False
